<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxLog</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
  --red: #f85149; --green: #3fb950; --yellow: #d29922;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5; }

/* Layout */
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
header { display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
header h1 { font-size: 20px; font-weight: 600; }
header h1 span { color: var(--accent); }

/* Stats bar */
.stats-bar { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; min-width: 120px; }
.stat-value { font-size: 24px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.tab { padding: 8px 16px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent;
  font-size: 14px; transition: all 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Search */
.search-bar { display: flex; gap: 8px; margin-bottom: 20px; }
.search-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px; outline: none; }
.search-bar input:focus { border-color: var(--accent); }
.search-bar input::placeholder { color: var(--text2); }
.search-bar button { background: var(--accent); color: #fff; border: none; border-radius: 6px;
  padding: 8px 16px; cursor: pointer; font-size: 14px; font-weight: 500; }
.search-bar button:hover { opacity: 0.9; }

/* Record button */
.record-section { text-align: center; margin: 32px 0; }
.record-btn { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--border);
  background: var(--surface); cursor: pointer; display: inline-flex; align-items: center;
  justify-content: center; transition: all 0.2s; }
.record-btn:hover { border-color: var(--red); }
.record-btn.recording { border-color: var(--red); background: rgba(248,81,73,0.15);
  animation: pulse 1.5s infinite; }
.record-btn svg { width: 32px; height: 32px; fill: var(--text); }
.record-btn.recording svg { fill: var(--red); }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.record-status { margin-top: 12px; font-size: 13px; color: var(--text2); min-height: 20px; }
.record-result { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-top: 16px; display: none; }
.record-result.visible { display: block; }
.record-result .text { font-size: 16px; line-height: 1.6; }
.record-result .meta { font-size: 12px; color: var(--text2); margin-top: 8px; }

/* Timeline */
.timeline { list-style: none; }
.timeline-item { background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px; margin-bottom: 8px; transition: border-color 0.15s; }
.timeline-item:hover { border-color: var(--accent); }
.timeline-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.timeline-meta .time { font-weight: 600; color: var(--accent); }
.timeline-meta .app { background: var(--bg); padding: 1px 6px; border-radius: 3px; }
.timeline-meta .raw { color: var(--yellow); }
.timeline-text { font-size: 14px; line-height: 1.6; }

/* Dictionary */
.dict-table { width: 100%; border-collapse: collapse; }
.dict-table th { text-align: left; font-size: 12px; color: var(--text2); padding: 8px;
  border-bottom: 1px solid var(--border); }
.dict-table td { padding: 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
.dict-table .wrong { color: var(--red); }
.dict-table .right { color: var(--green); font-weight: 500; }
.dict-add { display: flex; gap: 8px; margin-top: 12px; }
.dict-add input { background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 13px; flex: 1; }

/* Env switcher */
.env-switcher { display: flex; gap: 8px; align-items: center; }
.env-switcher select { background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 13px; }
.env-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.env-badge.home { background: rgba(88,166,255,0.15); color: var(--accent); }
.env-badge.office { background: rgba(63,185,80,0.15); color: var(--green); }

.empty { text-align: center; padding: 48px; color: var(--text2); }
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>Vox</span>Log</h1>
    <div class="env-switcher">
      <select id="envSelect" onchange="switchEnv(this.value)">
        <option value="home">Home (US)</option>
        <option value="office">Office (CN)</option>
      </select>
    </div>
  </header>

  <div class="stats-bar" id="statsBar"></div>

  <div class="tabs">
    <div class="tab active" data-tab="record" onclick="showTab('record')">Record</div>
    <div class="tab" data-tab="history" onclick="showTab('history')">History</div>
    <div class="tab" data-tab="search" onclick="showTab('search')">Search</div>
    <div class="tab" data-tab="dictionary" onclick="showTab('dictionary')">Dictionary</div>
  </div>

  <!-- Record Tab -->
  <div id="tab-record" class="tab-content">
    <div class="record-section">
      <button class="record-btn" id="recordBtn" onmousedown="startRecording()" onmouseup="stopRecording()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <div class="record-status" id="recordStatus">Hold button to record</div>
      <div class="record-result" id="recordResult">
        <div class="text" id="resultText"></div>
        <div class="meta" id="resultMeta"></div>
      </div>
    </div>
  </div>

  <!-- History Tab -->
  <div id="tab-history" class="tab-content hidden">
    <div class="search-bar">
      <input type="date" id="historyDate" onchange="loadHistory()">
      <button onclick="exportDay()">Export to Obsidian</button>
    </div>
    <ul class="timeline" id="historyList"></ul>
  </div>

  <!-- Search Tab -->
  <div id="tab-search" class="tab-content hidden">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search your voice history..." onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">Search</button>
    </div>
    <ul class="timeline" id="searchResults"></ul>
  </div>

  <!-- Dictionary Tab -->
  <div id="tab-dictionary" class="tab-content hidden">
    <table class="dict-table" id="dictTable">
      <thead><tr><th>Wrong</th><th>Correct</th><th></th></tr></thead>
      <tbody id="dictBody"></tbody>
    </table>
    <div class="dict-add">
      <input id="dictWrong" placeholder="Wrong text (e.g. cloud code)">
      <input id="dictRight" placeholder="Correct text (e.g. Claude Code)">
      <button class="search-bar" style="background:var(--green);color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer" onclick="addTerm()">Add</button>
    </div>
  </div>
</div>

<script>
const API = '';
const TOKEN = 'voxlog-dev-token';
const headers = { 'Authorization': `Bearer ${TOKEN}` };

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

// --- Stats ---
async function loadStats() {
  try {
    const r = await fetch(`${API}/v1/stats`, { headers });
    const s = await r.json();
    document.getElementById('statsBar').innerHTML = `
      <div class="stat"><div class="stat-value">${s.total_recordings}</div><div class="stat-label">Total recordings</div></div>
      <div class="stat"><div class="stat-value">${s.total_duration_min}</div><div class="stat-label">Minutes recorded</div></div>
      <div class="stat"><div class="stat-value">${s.today_recordings}</div><div class="stat-label">Today</div></div>
      <div class="stat"><div class="stat-value">${s.avg_latency_ms}ms</div><div class="stat-label">Avg latency</div></div>
      <div class="stat"><div class="stat-value">~${s.estimated_monthly_cost_cny}</div><div class="stat-label">Est. CNY/month</div></div>
    `;
  } catch(e) { console.error('Stats failed:', e); }
}

// --- Tabs ---
function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.remove('hidden');
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
  if (name === 'history') loadHistory();
  if (name === 'dictionary') loadDictionary();
}

// --- Recording ---
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('recordStatus').textContent = 'Recording... release to stop';
    document.getElementById('recordResult').classList.remove('visible');
  } catch(e) {
    document.getElementById('recordStatus').textContent = 'Microphone access denied';
  }
}

async function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('recordStatus').textContent = 'Processing...';

  mediaRecorder.stop();
  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });

    // Convert webm to wav using AudioContext
    const arrayBuffer = await blob.arrayBuffer();
    const audioCtx = new AudioContext({ sampleRate: 16000 });
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    const wavBlob = audioBufferToWav(audioBuffer);

    const formData = new FormData();
    formData.append('audio', wavBlob, 'recording.wav');
    formData.append('source', 'web');
    formData.append('env', document.getElementById('envSelect').value);
    formData.append('target_app', 'VoxLog Web');

    try {
      const r = await fetch(`${API}/v1/voice`, { method: 'POST', headers: { 'Authorization': `Bearer ${TOKEN}` }, body: formData });
      if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
      const result = await r.json();

      document.getElementById('resultText').textContent = result.polished_text;
      document.getElementById('resultMeta').textContent =
        `${result.asr_provider} | ${result.latency_ms}ms | ${result.duration_seconds.toFixed(1)}s${result.polished ? '' : ' (raw)'}`;
      document.getElementById('recordResult').classList.add('visible');
      document.getElementById('recordStatus').textContent = 'Hold button to record';

      // Copy to clipboard
      navigator.clipboard.writeText(result.polished_text).then(() => {
        document.getElementById('recordStatus').textContent = 'Copied to clipboard! Hold button to record again.';
      });
      loadStats();
    } catch(e) {
      document.getElementById('recordStatus').textContent = `Error: ${e.message}`;
    }
    audioCtx.close();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  };
}

function audioBufferToWav(buffer) {
  const numChannels = 1;
  const sampleRate = buffer.sampleRate;
  const format = 1; // PCM
  const bitDepth = 16;
  const data = buffer.getChannelData(0);
  const dataLength = data.length * 2;
  const headerLength = 44;
  const totalLength = headerLength + dataLength;
  const arrayBuffer = new ArrayBuffer(totalLength);
  const view = new DataView(arrayBuffer);

  function writeString(offset, string) {
    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
  }
  writeString(0, 'RIFF');
  view.setUint32(4, totalLength - 8, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, format, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * bitDepth / 8, true);
  view.setUint16(32, numChannels * bitDepth / 8, true);
  view.setUint16(34, bitDepth, true);
  writeString(36, 'data');
  view.setUint32(40, dataLength, true);

  let offset = 44;
  for (let i = 0; i < data.length; i++) {
    const s = Math.max(-1, Math.min(1, data[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset += 2;
  }
  return new Blob([arrayBuffer], { type: 'audio/wav' });
}

// --- History ---
async function loadHistory() {
  const dateInput = document.getElementById('historyDate');
  if (!dateInput.value) dateInput.value = new Date().toISOString().slice(0, 10);
  const r = await fetch(`${API}/v1/history?date=${dateInput.value}`, { headers });
  const items = await r.json();
  const list = document.getElementById('historyList');
  if (!items.length) { list.innerHTML = '<div class="empty">No recordings on this date.</div>'; return; }
  list.innerHTML = items.map(it => `
    <li class="timeline-item">
      <div class="timeline-meta">
        <span class="time">${it.created_at.slice(11,19)}</span>
        ${it.target_app ? `<span class="app">${it.target_app}</span>` : ''}
        <span>${it.asr_provider}</span>
        <span>${it.latency_ms}ms</span>
        ${!it.polished ? '<span class="raw">raw</span>' : ''}
      </div>
      <div class="timeline-text">${escapeHtml(it.polished_text)}</div>
    </li>`).join('');
}

async function exportDay() {
  const date = document.getElementById('historyDate').value;
  if (!date) return;
  const r = await fetch(`${API}/v1/history/export?date=${date}`, { headers });
  const md = await r.text();
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${date}-voice-log.md`;
  a.click();
}

// --- Search ---
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const r = await fetch(`${API}/v1/history?q=${encodeURIComponent(q)}`, { headers });
  const items = await r.json();
  const list = document.getElementById('searchResults');
  if (!items.length) { list.innerHTML = `<div class="empty">No results for "${escapeHtml(q)}".</div>`; return; }
  list.innerHTML = items.map(it => `
    <li class="timeline-item">
      <div class="timeline-meta">
        <span class="time">${it.created_at.slice(0,10)} ${it.created_at.slice(11,19)}</span>
        ${it.target_app ? `<span class="app">${it.target_app}</span>` : ''}
      </div>
      <div class="timeline-text">${highlight(it.polished_text, q)}</div>
    </li>`).join('');
}

// --- Dictionary ---
let currentDict = {};
async function loadDictionary() {
  const r = await fetch(`${API}/v1/dictionary`, { headers });
  if (!r.ok) return;
  currentDict = await r.json();
  const body = document.getElementById('dictBody');
  const entries = Object.entries(currentDict.corrections || {});
  if (!entries.length) { body.innerHTML = '<tr><td colspan="3" class="empty">No dictionary entries.</td></tr>'; return; }
  body.innerHTML = entries.map(([wrong, right]) => `
    <tr>
      <td class="wrong">${escapeHtml(wrong)}</td>
      <td class="right">${escapeHtml(right)}</td>
      <td><button onclick="deleteTerm('${escapeHtml(wrong)}')" style="background:none;border:none;color:var(--red);cursor:pointer">x</button></td>
    </tr>`).join('');
}

async function addTerm() {
  const wrong = document.getElementById('dictWrong').value.trim();
  const right = document.getElementById('dictRight').value.trim();
  if (!wrong || !right) return;
  await fetch(`${API}/v1/dictionary`, {
    method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'add', wrong, right })
  });
  document.getElementById('dictWrong').value = '';
  document.getElementById('dictRight').value = '';
  loadDictionary();
}

async function deleteTerm(wrong) {
  await fetch(`${API}/v1/dictionary`, {
    method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'delete', wrong })
  });
  loadDictionary();
}

// --- Env ---
async function switchEnv(env) {
  const formData = new FormData();
  formData.append('env', env);
  await fetch(`${API}/v1/env`, { method: 'POST', headers: { 'Authorization': `Bearer ${TOKEN}` }, body: formData });
}

// --- Utils ---
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function highlight(text, q) {
  const escaped = escapeHtml(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escaped.replace(re, '<mark style="background:var(--yellow);color:var(--bg);padding:0 2px;border-radius:2px">$1</mark>');
}

// --- Init ---
loadStats();
</script>
</body>
</html>
